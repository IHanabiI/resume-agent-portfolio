services:
  - type: web
    name: resume-agent
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.address 0.0.0.0 --server.port $PORT --server.headless true
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.5
      - key: OPENAI_ENABLE_DEMO_FALLBACK
        value: "true"
      - key: APP_PASSWORD
        sync: false
